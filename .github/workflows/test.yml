# .github/workflows/test.yml
#
# ReviewHub — Full CI Test Pipeline
#
# Triggers:
#   • Every push to main / develop
#   • Every pull request targeting main
#
# Jobs:
#   1. unit-tests    — Vitest (password-validation, auth-errors, AuthPage, ReviewCard)
#   2. e2e-tests     — Playwright (auth flows, XSS regression, RLS API checks)
#   3. db-tests      — pgTAP via Supabase CLI (RLS, cascade, views, triggers)
#   4. type-check    — tsc --noEmit (type safety gate)
#   5. lint          — ESLint (code quality gate)
#
# Required GitHub Secrets (add in Repo → Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN  — from supabase.com → Account → Access Tokens
#   SUPABASE_PROJECT_ID    — from supabase.com → Project → Settings → General
#   SUPABASE_DB_PASSWORD   — Supabase DB password (for supabase db pull)
#   VITE_SUPABASE_URL      — https://<project-ref>.supabase.co
#   VITE_SUPABASE_ANON_KEY — anon/public key from Supabase Dashboard
#   E2E_TEST_EMAIL         — email of a pre-created test user in Supabase Auth
#   E2E_TEST_PASSWORD      — password for the test user
#   E2E_XSS_SLUG           — slug of a business with XSS payload in its name

name: ReviewHub CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ══════════════════════════════════════════════════════════════════════════════
# Job 1: Type check (fastest gate — runs first, no browser needed)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npx tsc --noEmit

# ══════════════════════════════════════════════════════════════════════════════
# Job 2: Lint
# ══════════════════════════════════════════════════════════════════════════════
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

# ══════════════════════════════════════════════════════════════════════════════
# Job 3: Vitest unit + component tests
# ══════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    needs: [type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test -- --reporter=verbose --coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# Job 4: Playwright E2E tests
# ══════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E preview server
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: "http://localhost:4173"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_XSS_SLUG: ${{ secrets.E2E_XSS_SLUG }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# Job 5: pgTAP database tests
# ══════════════════════════════════════════════════════════════════════════════
  db-tests:
    name: pgTAP database tests
    runs-on: ubuntu-latest
    needs: [type-check]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Pull latest DB schema from remote (for accurate local tests)
        run: supabase db pull --schema public,auth
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        continue-on-error: true  # Don't fail if pull fails (use committed migrations)

      - name: Apply migrations to local DB
        run: supabase db push --local

      - name: Install pgTAP extension in local DB
        run: |
          supabase db execute --local \
            "CREATE EXTENSION IF NOT EXISTS pgtap SCHEMA extensions;"

      - name: Run pgTAP test suite
        run: supabase test db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

# ══════════════════════════════════════════════════════════════════════════════
# Job 6: Summary / gate (all jobs must pass for merge)
# ══════════════════════════════════════════════════════════════════════════════
  ci-gate:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [type-check, lint, unit-tests, e2e-tests, db-tests]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.type-check.result }}"  != "success" ]] ||
             [[ "${{ needs.lint.result }}"         != "success" ]] ||
             [[ "${{ needs.unit-tests.result }}"   != "success" ]] ||
             [[ "${{ needs.e2e-tests.result }}"    != "success" ]] ||
             [[ "${{ needs.db-tests.result }}"     != "success" ]]; then
            echo "❌ One or more CI jobs failed."
            echo "  type-check:  ${{ needs.type-check.result }}"
            echo "  lint:        ${{ needs.lint.result }}"
            echo "  unit-tests:  ${{ needs.unit-tests.result }}"
            echo "  e2e-tests:   ${{ needs.e2e-tests.result }}"
            echo "  db-tests:    ${{ needs.db-tests.result }}"
            exit 1
          fi
          echo "✅ All CI jobs passed — safe to merge."
