# .github/workflows/test.yml
#
# ReviewHub — Full CI Test Pipeline
#
# Triggers:
#   • Every push to main / develop
#   • Every pull request targeting main
#
# Jobs:
#   1. type-check  — tsc --noEmit  (always runs, blocks everything downstream)
#   2. lint        — ESLint         (always runs)
#   3. unit-tests  — Vitest         (always runs, needs type-check)
#   4. e2e-tests   — Playwright     (runs only when Supabase secrets are set)
#   5. db-tests    — pgTAP          (runs only when Supabase secrets are set)
#   6. ci-gate     — summary gate   (core jobs must pass; infra jobs pass OR skip)
#
# Required GitHub Secrets for E2E / pgTAP (Repo → Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN  — from supabase.com → Account → Access Tokens
#   SUPABASE_PROJECT_ID    — from supabase.com → Project → Settings → General
#   SUPABASE_DB_PASSWORD   — Supabase DB password (for supabase db pull)
#   VITE_SUPABASE_URL      — https://<project-ref>.supabase.co
#   VITE_SUPABASE_ANON_KEY — anon/public key from Supabase Dashboard
#   E2E_TEST_EMAIL         — email of a pre-created test user in Supabase Auth
#   E2E_TEST_PASSWORD      — password for the test user
#   E2E_XSS_SLUG           — slug of a business with XSS payload in its name

name: ReviewHub CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ══════════════════════════════════════════════════════════════════════════════
# Job 1: Type check (fastest gate — runs first, no browser needed)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npx tsc --noEmit

# ══════════════════════════════════════════════════════════════════════════════
# Job 2: Lint
# ══════════════════════════════════════════════════════════════════════════════
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

# ══════════════════════════════════════════════════════════════════════════════
# Job 3: Vitest unit + component tests
# ══════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    needs: [type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test -- --reporter=verbose --coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# Job 4: Playwright E2E tests
# Skipped automatically when VITE_SUPABASE_URL secret is not configured.
# ══════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 30
    # Skip this job if Supabase secrets are not configured — avoids
    # "Preview has not been built yet" and auth failures in forks / fresh repos.
    if: ${{ secrets.VITE_SUPABASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E preview server
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: "http://localhost:4173"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_XSS_SLUG: ${{ secrets.E2E_XSS_SLUG }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# Job 5: pgTAP database tests
# Skipped automatically when SUPABASE_ACCESS_TOKEN secret is not configured.
# ══════════════════════════════════════════════════════════════════════════════
  db-tests:
    name: pgTAP database tests
    runs-on: ubuntu-latest
    needs: [type-check]
    # Skip this job if Supabase credentials are not configured
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Pull latest DB schema from remote (for accurate local tests)
        run: supabase db pull --schema public,auth
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        continue-on-error: true  # Don't fail if pull fails (use committed migrations)

      - name: Apply migrations to local DB
        run: supabase db push --local

      - name: Install pgTAP extension in local DB
        run: |
          supabase db execute --local \
            "CREATE EXTENSION IF NOT EXISTS pgtap SCHEMA extensions;"

      - name: Run pgTAP test suite
        run: supabase test db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

# ══════════════════════════════════════════════════════════════════════════════
# Job 6: Summary / gate
#   Core jobs (type-check, lint, unit-tests) MUST succeed.
#   Infrastructure jobs (e2e-tests, db-tests) must succeed OR be skipped
#   (skipped = secrets not configured, which is acceptable).
# ══════════════════════════════════════════════════════════════════════════════
  ci-gate:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [type-check, lint, unit-tests, e2e-tests, db-tests]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          CORE_PASS=true
          INFRA_PASS=true

          # Core jobs must be "success"
          if [[ "${{ needs.type-check.result }}" != "success" ]]; then
            echo "❌ type-check: ${{ needs.type-check.result }}"
            CORE_PASS=false
          else
            echo "✅ type-check: ${{ needs.type-check.result }}"
          fi

          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ lint: ${{ needs.lint.result }}"
            CORE_PASS=false
          else
            echo "✅ lint: ${{ needs.lint.result }}"
          fi

          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ unit-tests: ${{ needs.unit-tests.result }}"
            CORE_PASS=false
          else
            echo "✅ unit-tests: ${{ needs.unit-tests.result }}"
          fi

          # Infrastructure jobs: "success" or "skipped" are both acceptable.
          # "skipped" means secrets are not yet configured (acceptable for fresh repos).
          E2E_RESULT="${{ needs.e2e-tests.result }}"
          if [[ "$E2E_RESULT" == "success" ]]; then
            echo "✅ e2e-tests: $E2E_RESULT"
          elif [[ "$E2E_RESULT" == "skipped" ]]; then
            echo "⏭️  e2e-tests: skipped (VITE_SUPABASE_URL secret not configured)"
          else
            echo "❌ e2e-tests: $E2E_RESULT"
            INFRA_PASS=false
          fi

          DB_RESULT="${{ needs.db-tests.result }}"
          if [[ "$DB_RESULT" == "success" ]]; then
            echo "✅ db-tests: $DB_RESULT"
          elif [[ "$DB_RESULT" == "skipped" ]]; then
            echo "⏭️  db-tests: skipped (SUPABASE_ACCESS_TOKEN secret not configured)"
          else
            echo "❌ db-tests: $DB_RESULT"
            INFRA_PASS=false
          fi

          if [[ "$CORE_PASS" == "false" || "$INFRA_PASS" == "false" ]]; then
            echo ""
            echo "❌ CI gate failed — see above for details."
            exit 1
          fi

          echo ""
          echo "✅ All CI jobs passed (or were intentionally skipped) — safe to merge."
